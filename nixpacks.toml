[phases.setup]
aptPkgs = ["libgl1-mesa-glx", "libglib2.0-0", "libxcb1", "libsm6", "libxext6", "libxrender1"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = "python app/server.py --host 0.0.0.0 --port ${PORT:-5000}"
