<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- Pose landmark figure - dynamic squat pose -->
  <!-- Head -->
  <circle cx="256" cy="108" r="32" fill="#fff"/>
  <!-- Torso -->
  <line x1="256" y1="140" x2="256" y2="260" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="256" y1="180" x2="185" y2="155" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="185" y1="155" x2="140" y2="120" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="256" y1="180" x2="327" y2="155" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="327" y1="155" x2="372" y2="120" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="256" y1="260" x2="195" y2="330" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="195" y1="330" x2="155" y2="410" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="256" y1="260" x2="317" y2="330" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <line x1="317" y1="330" x2="357" y2="410" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  <!-- Pose landmark dots (the CV element) -->
  <circle cx="256" cy="108" r="14" fill="#fff" opacity="0.4"/>
  <circle cx="256" cy="180" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="185" cy="155" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="140" cy="120" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="327" cy="155" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="372" cy="120" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="256" cy="260" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="195" cy="330" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="155" cy="410" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="317" cy="330" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="357" cy="410" r="10" fill="#fff" opacity="0.5"/>
  <!-- Vision/scan ring around head -->
  <circle cx="256" cy="108" r="48" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="12 8" opacity="0.6"/>
</svg>
